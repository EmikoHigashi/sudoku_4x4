<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>4x4 Sudoku Maker</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .no-print { 
            max-width: 700px; margin: 0 auto 30px; background: white; 
            padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .controls { display: flex; gap: 20px; margin-bottom: 20px; text-align: left; }
        .control-group { flex: 1; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .btn-container { display: flex; gap: 10px; }
        button { 
            padding: 12px 24px; border: none; border-radius: 6px; 
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-gen { background: #3498db; color: white; }
        .btn-gen:hover { background: #2980b9; }
        .btn-print { background: #27ae60; color: white; }
        .btn-print:hover { background: #219150; }

        /* パズル表示エリア */
        #output { display: flex; flex-direction: column; align-items: center; gap: 50px; }
        .puzzle-card { background: white; padding: 30px; border-radius: 10px; width: 100%; max-width: 450px; }
        .puzzle-title { font-size: 24px; margin-bottom: 15px; font-weight: bold; text-align: center; }

        .sudoku-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            border: 4px solid #000; width: 100%; aspect-ratio: 1/1; 
        }
        .cell { 
            border: 1px solid #999; display: flex; align-items: center; 
            justify-content: center; font-size: 50px; font-weight: bold; background: white; 
        }
        /* 2x2の太線区切り */
        .cell:nth-child(2n) { border-right: 1px solid #999; }
        .cell:nth-child(2n+2):not(:nth-child(4n)) { border-right: 4px solid #000; }
        .sudoku-grid > div:nth-child(n+9):nth-child(-n+12) { border-top: 4px solid #000; }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            #output { gap: 0; }
            .puzzle-card { page-break-after: always; box-shadow: none; border: none; max-width: none; width: 85%; }
            .cell { font-size: 70px; }
            @page { size: A4 portrait; margin: 10mm; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h1>4x4 ナンプレメーカー</h1>
    <p>お子様が書き込みやすい「大きなセル」の数独を生成します。</p>
    
    <div class="controls">
        <div class="control-group">
            <label>生成する数 (偶数推奨):</label>
            <input type="number" id="numPuzzles" value="2" min="1">
        </div>
        <div class="control-group">
            <label>空欄の数 (難易度 2〜10):</label>
            <input type="number" id="numHoles" value="6" min="1" max="14">
        </div>
    </div>
    
    <div class="btn-container">
        <button class="btn-gen" onclick="generate()">パズルを新しく作る</button>
        <button class="btn-print" onclick="window.print()">A4 PDF保存 / 印刷</button>
    </div>
</div>

<div id="output"></div>

<script>
    // 基本となる完成図
    const BASE = [
        [1, 2, 3, 4],
        [3, 4, 1, 2],
        [2, 1, 4, 3],
        [4, 3, 2, 1]
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function generate() {
        const numPuzzles = parseInt(document.getElementById('numPuzzles').value) || 2;
        const numHoles = parseInt(document.getElementById('numHoles').value) || 6;
        const output = document.getElementById('output');
        output.innerHTML = ''; // クリア

        for (let i = 1; i <= numPuzzles; i++) {
            // 解の作成
            let grid = JSON.parse(JSON.stringify(BASE));
            
            // 数字の入れ替え
            const mapping = shuffle([1, 2, 3, 4]);
            grid = grid.map(row => row.map(v => mapping[v-1]));

            // 行・列の入れ替え（簡易版）
            if (Math.random() > 0.5) [grid[0], grid[1]] = [grid[1], grid[0]];
            if (Math.random() > 0.5) [grid[2], grid[3]] = [grid[3], grid[2]];

            // 穴あけ
            let puzzle = JSON.parse(JSON.stringify(grid));
            let coords = [];
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) coords.push([r,c]);
            shuffle(coords).slice(0, numHoles).forEach(pos => {
                puzzle[pos[0]][pos[1]] = "";
            });

            // 表示用HTML作成
            const card = document.createElement('div');
            card.className = 'puzzle-card';
            card.innerHTML = `<div class="puzzle-title">もんだい ${i}</div>`;
            
            const gridDiv = document.createElement('div');
            gridDiv.className = 'sudoku-grid';
            puzzle.flat().forEach(val => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = val;
                gridDiv.appendChild(cell);
            });
            
            card.appendChild(gridDiv);
            output.appendChild(card);
        }
    }

    // 最初に1回実行しておく
    generate();
</script>

</body>
</html>
