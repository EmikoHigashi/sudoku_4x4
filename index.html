<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>4x4 Sudoku for Kids - Printable</title>
    <style>
        /* 画面表示用のスタイル */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f9f9f9; margin: 0; padding: 20px; color: #333; }
        .no-print { max-width: 800px; margin: 0 auto 30px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #2c3e50; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #3498db; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #2980b9; }
        .print-btn { background: #27ae60; }
        .print-btn:hover { background: #219150; }

        /* パズルのレイアウト */
        #output { display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .puzzle-block { background: white; padding: 20px; width: 100%; max-width: 500px; }
        .sudoku-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            border: 4px solid #000; 
            width: 100%;
            aspect-ratio: 1 / 1;
        }
        .cell {
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px; /* 数字を大きく */
            font-weight: bold;
            background: white;
        }
        /* 2x2の太線区切り */
        .cell:nth-child(2n) { border-right: 1px solid #ccc; }
        .cell:nth-child(4n) { border-right: none; }
        .cell:nth-child(2n+2):not(:nth-child(4n)) { border-right: 4px solid #000; }
        .sudoku-grid > div:nth-child(n+5):nth-child(-n+8),
        .sudoku-grid > div:nth-child(n+13):nth-child(-n+16) { border-top: 1px solid #ccc; }
        .sudoku-grid > div:nth-child(n+9):nth-child(-n+12) { border-top: 4px solid #000; }

        .puzzle-title { font-size: 20px; margin-bottom: 10px; font-weight: bold; }

        /* 印刷・PDF保存用の設定 */
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none; }
            #output { gap: 0; }
            .puzzle-block { 
                page-break-after: auto; 
                margin-bottom: 60px; /* 1ページに2個入るよう調整 */
                max-width: none;
                width: 90%;
            }
            .cell { font-size: 64px; } /* 印刷時はさらに大きく */
            @page { size: A4 portrait; margin: 15mm; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h1>4x4 ナンプレメーカー</h1>
    <p>お子様が書き込みやすい「大きなセル」の数独を生成します。1ページに2個配置されます。</p>
    
    <div class="controls">
        <div>
            <label>生成する数 (偶数推奨):</label>
            <input type="number" id="numPuzzles" value="2" min="2" max="20">
        </div>
        <div>
            <label>空欄の数 (難易度):</label>
            <input type="number" id="numHoles" value="6" min="2" max="12">
        </div>
    </div>
    
    <button onclick="generate()">パズルを新しく作る</button>
    <button class="print-btn" onclick="window.print()">A4 PDF保存 / 印刷</button>
</div>

<div id="output">
    </div>

<script>
    const BASE = [
        [1, 2, 3, 4],
        [3, 4, 1, 2],
        [2, 1, 4, 3],
        [4, 3, 2, 1]
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function makeSolution() {
        let grid = JSON.parse(JSON.stringify(BASE));
        
        // シンボルの入れ替え
        const nums = shuffle([1, 2, 3, 4]);
        const map = {1: nums[0], 2: nums[1], 3: nums[2], 4: nums[3]};
        grid = grid.map(row => row.map(v => map[v]));

        // バンド（行の塊）の入れ替え
        if (Math.random() < 0.5) [grid[0], grid[2]] = [grid[2], grid[0]], [grid[1], grid[3]] = [grid[3], grid[1]];
        // 各バンド内での行入れ替え
        if (Math.random() < 0.5) [grid[0], grid[1]] = [grid[1], grid[0]];
        if (Math.random() < 0.5) [grid[2], grid[3]] = [grid[3], grid[2]];

        return grid;
    }

    function generate() {
        const numPuzzles = document.getElementById('numPuzzles').value;
        const numHoles = document.getElementById('numHoles').value;
        const output = document.getElementById('output');
        output.innerHTML = '';

        for (let i = 1; i <= numPuzzles; i++) {
            const solution = makeSolution();
            const puzzle = JSON.parse(JSON.stringify(solution));
            
            // 穴あけ
            let cells = [];
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) cells.push([r,c]);
            shuffle(cells).slice(0, numHoles).forEach(pos => {
                puzzle[pos[0]][pos[1]] = 0;
            });

            // HTML生成
            const block = document.createElement('div');
            block.className = 'puzzle-block';
            block.innerHTML = `<div class="puzzle-title">もんだい ${i}</div>`;
            
            const gridDiv = document.createElement('div');
            gridDiv.className = 'sudoku-grid';
            
            for(let r=0; r<4; r++) {
                for(let c=0; c<4; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = puzzle[r][c] === 0 ? '' : puzzle[r][c];
                    gridDiv.appendChild(cell);
                }
            }
            block.appendChild(gridDiv);
            output.appendChild(block);
        }
    }

    // 初回実行
    generate();
</script>

</body>
</html>
